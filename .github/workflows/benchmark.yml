name: Benchmark

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  benchmark:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            build_type: Release
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
            build_type: Release
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            build_type: Release
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
            build_type: Release

    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build Benchmark
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }} --target fixed64_benchmark

    - name: Run Benchmark
      id: bench
      shell: bash
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: |
        if [ "$RUNNER_OS" = "Windows" ]; then
          BENCH_BIN="Release/fixed64_benchmark.exe"
        else
          BENCH_BIN="./fixed64_benchmark"
        fi
        $BENCH_BIN | tee benchmark_output.txt

    - name: Write Step Summary
      shell: bash
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: |
        {
          echo "## Benchmark: ${{ matrix.os }} / ${{ matrix.c_compiler }}"
          echo ""
          echo '```'
          cat benchmark_output.txt
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload Benchmark Results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-${{ matrix.os }}-${{ matrix.c_compiler }}
        path: ${{ steps.strings.outputs.build-output-dir }}/benchmark_output.txt
